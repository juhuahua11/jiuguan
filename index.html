/* ── 记忆宫殿面板 ── */
.memory-panel{margin-top:12px;border:1px solid var(--border-color);border-radius:var(--radius-sm);background:var(--bg-secondary);overflow:hidden;font-size:13px}.memory-panel-header{padding:8px 12px;cursor:pointer;user-select:none;-webkit-user-select:none;color:var(--text-muted);display:flex;align-items:center;gap:6px;transition:background var(--transition)}.memory-panel-header:hover{background:var(--bg-hover);color:var(--text-secondary)}.memory-panel-arrow{font-size:10px;transition:transform var(--transition);display:inline-block}.memory-panel:not(.expanded) .memory-panel-arrow{transform:rotate(-90deg)}.memory-panel-body{padding:6px 12px 10px;border-top:1px solid var(--border-color);line-height:1.6;color:var(--text-secondary);display:block}.memory-panel:not(.expanded) .memory-panel-body{display:none}.memory-line{padding:2px 0}.memory-label{color:var(--text-muted);font-weight:600;margin-right:2px}
/* ── 配图面板 ── */
.ill-source{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ill-source label{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text-primary);cursor:pointer}
.ill-source input[type="radio"]{cursor:pointer;accent-color:var(--accent)}
#illPrompt{display:block;width:100%;box-sizing:border-box;resize:vertical;font-family:var(--font);font-size:14px;line-height:1.5;padding:10px 12px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-primary);outline:none;transition:border-color var(--transition)}

#illPrompt::placeholder{color:var(--text-muted)}

.ill-status.error{color:#e74c3c}
.ill-status.busy{color:var(--accent)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:4px}

.message-illustration{margin-top:10px}
.message-illustration img{max-width:100%;border-radius:var(--radius-sm);display:block}
.message-illustration .ill-placeholder{color:var(--text-muted);font-size:13px}
.mem-console { position: fixed; bottom: 0; left: 0; right: 0; height: 220px;
  background: #1e1e1e; color: #ddd; font-family: monospace; font-size: 12px;
  border-top: 2px solid #444; z-index: 1000; display: flex; flex-direction: column;
  transition: height 0.2s; }

  background: #2a2a2a; border-bottom: 1px solid #444; cursor: pointer; }

.mem-console-filters label { cursor: pointer; }
.mem-console-toggle { background: none; border: none; color: #ddd; cursor: pointer; font-size: 14px; }
.mem-console-body { flex: 1; overflow-y: auto; padding: 4px 10px; line-height: 1.4; }
.mem-console.collapsed .mem-console-body { display: none; }
.mem-log-line { white-space: pre-wrap; word-break: break-all; }
.mem-log-line.warn { color: #ffb86c; }
.mem-log-line.error { color: #ff5555; }

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="btn-new-chat" id="newChatBtn"><span>+</span> 新对话</button>
      <button class="sidebar-toggle-btn" id="closeSidebarBtn" title="收起">◀</button>
    </div>
    <div class="conversation-list" id="conversationList"></div>
    <div class="sidebar-footer">
      <span class="total-info" id="totalInfo">0 个对话</span>

<script>const SYSTEM_PROMPT = `
### 文风

### 回复模版要求：
回复严格遵循以下格式：
纯文本，小说式：
[章节序号+章节标题]
[叙事正文]
(要求：高质量长文本的单章小说，不低于2000字一章)
---
---
【下一步剧情发展推荐选项】
 选项 A：[保守/原著型]
 选项 B：[戏谑/博弈型]
 选项 C：[规则/修改型]
 选项 D：[创新/xp增加型]
 
`;
// 记忆宫殿模块
// 负责：STM 生成、LTM 合并、记忆 prompt 构建、前端面板 HTML

// ── 摘要 API 调用 ──
async function callSummaryAPI(messages, settings) {
  const { apiUrl, apiKey, modelName } = settings;
  const url = apiUrl.replace(/\/chat\/completions\/?$/, "") + "/chat/completions";
  const body = {
    model: modelName,
    messages: messages,
    stream: false,
    temperature: 0.3,
    max_tokens: 2000,
  };
  const r = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      ...(url.includes("xiaomimimo")
        ? { "api-key": apiKey }
        : { Authorization: "Bearer " + apiKey }),
    },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const errText = await r.text().catch(function() { return "unknown"; });
    throw new Error("摘要 API 调用失败: HTTP " + r.status + " " + errText.slice(0, 100));
  }
  const d = await r.json();
  return d.choices?.[0]?.message?.content || "";
}

// ── STM 生成 prompt ──
const STM_SYSTEM_PROMPT = "你是一个记忆归档助手。你的任务是根据一轮对话（用户消息+AI回复），提取结构化的短期记忆。\n\n规则：\n1. 变化描述严格基于对话原文，不夸张、不补充、不推测\n2. 没有发生的维度可以省略对应字段或留空数组\n3. 角色名严格使用对话中出现的名字\n4. 只做客观归纳，不加入主观评价\n\n输出必须是合法的 JSON 对象，格式如下：\n{\n  \"characters\": [\"角色1\", \"角色2\"],\n  \"keyEvent\": \"本轮核心事件（1-2句）\",\n  \"psychologicalChanges\": [\n    { \"character\": \"角色名\", \"from\": \"变化前状态\", \"to\": \"变化后状态\", \"note\": \"补充说明\" }\n  ],\n  \"physiologicalChanges\": [\n    { \"character\": \"角色名\", \"change\": \"变化描述\" }\n  ],\n  \"relationshipChanges\": [\n    { \"from\": \"角色A\", \"to\": \"角色B\", \"fromState\": \"变化前关系\", \"toState\": \"变化后关系\" }\n  ],\n  \"newSettings\": [\"新增设定1\", \"新增设定2\"]\n}";

function buildSTMPrompt(userMsg, assistantMsg) {
  return [
    { role: "system", content: STM_SYSTEM_PROMPT },
    { role: "user", content: "用户消息：\n" + userMsg + "\n\nAI回复：\n" + assistantMsg + "\n\n请提取本轮对话的短期记忆，输出JSON。" },
  ];
}

// ── LTM 合并 prompt ──
const LTM_SYSTEM_PROMPT = "你是一个记忆归档助手。你的任务是将 7 条短期记忆（结构化JSON）合并为1条长期记忆。\n\n规则：\n1. 基于给出的短期记忆内容进行归纳，不要凭空添加信息\n2. 剧情线总结应该连贯叙事，串联这7轮的关键事件\n3. 角色变化汇总应体现这段时间内的整体弧光，包含数值变化和关键转折\n\n输出必须是合法的 JSON 对象，格式如下：\n{\n  \"plotSummary\": \"第N-M轮的剧情线总结（叙事性文字）\",\n  \"characterArcs\": [\n    { \"character\": \"角色名\", \"arc\": \"变化脉络（如：高冷仙子→肉体屈服意志仍在挣扎）\", \"detail\": \"详细说明\" }\n  ]\n}";

function buildLTMPrompt(stms) {
  const stmText = stms.map(function(s, i) {
    return "第 " + s.round + " 轮：\n" + JSON.stringify(s, null, 2);
  }).join("\n\n");
  return [
    { role: "system", content: LTM_SYSTEM_PROMPT },
    { role: "user", content: "以下7条短期记忆：\n\n" + stmText + "\n\n请合并为1条长期记忆，输出JSON。" },
  ];
}

// ── 提取 JSON ──
function extractJSON(raw) {
  let json = raw.trim();
  const codeMatch = json.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (codeMatch) json = codeMatch[1].trim();
  return JSON.parse(json);
}

// ── 生成短期记忆 ──
async function generateSTM(conv, round, userContent, assistantContent, settings) {
  const messages = buildSTMPrompt(userContent, assistantContent);
  const raw = await callSummaryAPI(messages, settings);
  const data = extractJSON(raw);
  return {
    id: "stm_" + round,
    round: round,
    characters: data.characters || [],
    keyEvent: data.keyEvent || "",
    psychologicalChanges: data.psychologicalChanges || [],
    physiologicalChanges: data.physiologicalChanges || [],
    relationshipChanges: data.relationshipChanges || [],
    newSettings: data.newSettings || [],
  };
}

// ── 合并长期记忆 ──
async function mergeToLTM(conv, stms, settings) {
  const messages = buildLTMPrompt(stms);
  const raw = await callSummaryAPI(messages, settings);
  const data = extractJSON(raw);
  const firstRound = stms[0].round;
  const lastRound = stms[stms.length - 1].round;
  return {
    id: "ltm_" + (conv.memory.longTerm.length + 1),
    roundsCovered: firstRound + "-" + lastRound,
    plotSummary: data.plotSummary || "",
    characterArcs: data.characterArcs || [],
    mergedFrom: stms.map(function(s) { return s.id; }),
  };
}

// ── 初始化记忆结构 ──
function ensureMemory(conv) {
  if (!conv.memory) {
    conv.memory = { shortTerm: [], longTerm: [], lastMergedRound: 0 };
  }
  return conv.memory;
}

// ── 主入口：每轮对话后触发 ──
async function triggerMemoryUpdate(conv, settings) {
  if (!conv || !conv.messages) return;
  ensureMemory(conv);

  // 找到最新的 user-assistant 配对
  const msgs = conv.messages;
  let lastUserIdx = -1;
  let lastAsstIdx = -1;
  for (let i = msgs.length - 1; i >= 0; i--) {
    if (msgs[i].role === "assistant" && lastAsstIdx === -1) lastAsstIdx = i;
    if (msgs[i].role === "user" && lastUserIdx === -1) lastUserIdx = i;
    if (lastUserIdx !== -1 && lastAsstIdx !== -1) break;
  }
  if (lastUserIdx === -1 || lastAsstIdx === -1) return;

  // 计算轮次（user消息数量）
  let round = 0;
  for (let j = 0; j <= lastAsstIdx; j++) {
    if (msgs[j].role === "user") round++;
  }

  // 检查是否已有此轮 STM
  const existing = conv.memory.shortTerm.filter(function(s) { return s.round === round; });
  if (existing.length > 0) return;

  const userContent = msgs[lastUserIdx].content;
  const asstContent = msgs[lastAsstIdx].content;

  // 跳过太短的回复（可能是错误或取消）
  if (asstContent.length < 20) return;

  try {
    const stm = await generateSTM(conv, round, userContent, asstContent, settings);
    conv.memory.shortTerm.push(stm);

    // 未合并的 STM
    const unmerged = conv.memory.shortTerm.filter(function(s) {
      return s.round > conv.memory.lastMergedRound;
    });

    // 每 7 条合并一次
    if (unmerged.length >= 7) {
      const toMerge = unmerged.slice(-7);
      try {
        const ltm = await mergeToLTM(conv, toMerge, settings);
        conv.memory.longTerm.push(ltm);
        conv.memory.lastMergedRound = toMerge[6].round;
      } catch (e) {
        console.error("LTM 合并失败:", e);
      }
    }
  } catch (e) {
    console.error("STM 生成失败:", e);
  }
}

// ── 构建注入 system prompt 的记忆文本 ──
// query: 可选，当前用户消息，用于关键词相关性过滤
function buildMemoryPrompt(conv, query) {
  ensureMemory(conv);
  const stms = conv.memory.shortTerm;
  const ltms = conv.memory.longTerm;
  const lastMerged = conv.memory.lastMergedRound || 0;

  const unmergedSTMs = stms.filter(function(s) { return s.round > lastMerged; });

  if (unmergedSTMs.length === 0 && ltms.length === 0) return "";

  // 提取查询关键词（长度>=2的中文或英文词）
  var keywords = [];
  if (query) {
    keywords = query.split(/[，,。！？!?\s\n…—]+/).filter(function(k) {
      return k.length >= 2;
    });
  }

  // 相关性过滤：有 query 时只保留匹配的短期记忆
  var filteredSTMs = unmergedSTMs;
  if (keywords.length > 0) {
    filteredSTMs = unmergedSTMs.filter(function(s) {
      var text = (s.keyEvent || "") + " " +
        (s.characters || []).join(" ") + " " +
        (s.newSettings || []).join(" ");
      s.psychologicalChanges.forEach(function(p) {
        text += " " + p.character + " " + p.from + " " + p.to + " " + (p.note || "");
      });
      s.physiologicalChanges.forEach(function(p) {
        text += " " + p.character + " " + p.change;
      });
      s.relationshipChanges.forEach(function(r) {
        text += " " + r.from + " " + r.to + " " + r.fromState + " " + r.toState;
      });
      return keywords.some(function(k) { return text.indexOf(k) !== -1; });
    });
  }

  if (filteredSTMs.length === 0 && ltms.length === 0) return "";

  // 紧凑格式输出
  var text = "\n\n[记忆档案] 据此保持角色一致性与剧情连贯。";

  if (filteredSTMs.length > 0) {
    text += "\n近期：";
    filteredSTMs.forEach(function(s) {
      text += "\nR" + s.round + ": " + (s.keyEvent || "");
      var extras = [];
      s.psychologicalChanges.forEach(function(p) {
        extras.push(p.character + "心理 " + p.from + "→" + p.to + (p.note ? "(" + p.note + ")" : ""));
      });
      s.physiologicalChanges.forEach(function(p) {
        extras.push(p.character + "生理 " + p.change);
      });
      s.relationshipChanges.forEach(function(r) {
        extras.push(r.from + "→" + r.to + "关系 " + r.fromState + "→" + r.toState);
      });
      s.newSettings.forEach(function(ns) {
        extras.push("新设定：" + ns);
      });
      if (extras.length > 0) text += " | " + extras.join("；");
    });
  }

  if (ltms.length > 0) {
    text += "\n历史概要：";
    ltms.forEach(function(l) {
      text += "\n[" + l.roundsCovered + "轮] " + l.plotSummary;
      if (l.characterArcs.length > 0) {
        var arcs = l.characterArcs.map(function(c) {
          return c.character + "：" + c.arc;
        });
        text += "（" + arcs.join("；") + "）";
      }
    });
  }

  return text;
}

// ── 构建前端记忆面板 HTML ──
function buildMemoryPanelHTML(conv, round) {
  ensureMemory(conv);
  const stm = conv.memory.shortTerm.filter(function(s) { return s.round === round; })[0];
  if (!stm) return "";

  let html = '<div class="memory-panel">';
  html += '<div class="memory-panel-header" onclick="this.parentElement.classList.toggle(\'expanded\')">';
  html += '<span class="memory-panel-arrow">▼</span> 【记忆宫殿】第 ' + stm.round + ' 轮摘要';
  html += '</div>';
  html += '<div class="memory-panel-body">';

  if (stm.characters.length > 0) {
    html += '<div class="memory-line"><span class="memory-label">涉及：</span>' + h(stm.characters.join("、")) + '</div>';
  }
  if (stm.keyEvent) {
    html += '<div class="memory-line"><span class="memory-label">事件：</span>' + h(stm.keyEvent) + '</div>';
  }
  stm.psychologicalChanges.forEach(function(p) {
    let line = '<div class="memory-line"><span class="memory-label">心理：</span>' + h(p.character + " " + p.from + "→" + p.to);
    if (p.note) line += "（" + h(p.note) + "）";
    line += '</div>';
    html += line;
  });
  stm.physiologicalChanges.forEach(function(p) {
    html += '<div class="memory-line"><span class="memory-label">生理：</span>' + h(p.character + " " + p.change) + '</div>';
  });
  stm.relationshipChanges.forEach(function(r) {
    html += '<div class="memory-line"><span class="memory-label">关系：</span>' + h(r.from + "→" + r.to + " " + r.fromState + "→" + r.toState) + '</div>';
  });
  if (stm.newSettings.length > 0) {
    stm.newSettings.forEach(function(ns) {
      html += '<div class="memory-line"><span class="memory-label">新设定：</span>' + h(ns) + '</div>';
    });
  }

  html += '</div></div>';
  return html;
}

  return [

// Step 2: 构建 API 请求体
const buildRequestBody = (model, stream) => (messages) => {
  const body = { model, messages, stream };
  const s = state.settings;
  if (s.reasoningEffort) {
    if (model.startsWith("mimo")) {
      body.chat_template_kwargs = { enable_thinking: true };
    } else {
      body.thinking = { type: "enabled" };
      body.reasoning_effort = s.reasoningEffort;
    }
  }
  if (s.temperature) body.temperature = parseFloat(s.temperature);
  if (s.maxTokens) body.max_tokens = parseInt(s.maxTokens);
  if (s.topP) body.top_p = parseFloat(s.topP);
  if (s.frequencyPenalty)
    body.frequency_penalty = parseFloat(s.frequencyPenalty);
  if (s.presencePenalty)
    body.presence_penalty = parseFloat(s.presencePenalty);
  return body;
};

// Step 3: 调用记忆代理 /api/chat（server 端转发给 memory-proxy 大脑 + 上游）
const callLLM = (url, key) => async (body) => {
  // 注入 chat_id，让大脑按对话隔离记忆 session
  const conv = getConv();
  const bodyWithChat = { ...body, chat_id: conv ? conv.id : undefined };
  const r = await fetch(window.location.origin + "/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(bodyWithChat),
    signal: state.abortController.signal,
  });
  if (!r.ok) {
    let em = "HTTP " + r.status;
    try {
      const ed = await r.json();
      const e = ed.error;
      em = (typeof e === "string") ? e
        : (e && typeof e === "object" && e.message) ? e.message
        : (e && typeof e === "object") ? JSON.stringify(e)
        : em;
    } catch (e) {
      try { em = await r.text(); } catch (e2) {}
    }
    throw new Error(em + (r.status === 404 ? " (请检查 API 地址)" : ""));
  }
  return r;
};

};

// Step 4s: 流式内容生成器
async function* streamContent(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split("\n");
    buf = lines.pop() || "";
    for (const line of lines) {
      const t = line.trim();
      if (!t || !t.startsWith("data: ")) continue;
      const d = t.slice(6);
      if (d === "[DONE]") continue;
      try {
        const p = JSON.parse(d);
        const delta = p.choices?.[0]?.delta?.content || "";
        if (delta) yield delta;
      } catch (e) {}
    }
  }
}

async function load() {
  try {
    const r = await fetch(API_SETTINGS);
    if (r.ok) {
      const d = await r.json();
      if (d && d.apiUrl !== undefined)
        state.settings = { ...state.settings, ...d };
    }
  } catch (e) {}

  let list = [];
  try {
    const r = await fetch(API_CONVERSATIONS);
    if (r.ok) list = await r.json();
  } catch (e) {}

  if (!list.length) {
    try {
      const raw = localStorage.getItem("ai-chat-fallback-v3");
      if (raw) {
        const d = JSON.parse(raw);
        if (d.data) {
          list = [
            {
              id: d.data.id,
              title: d.data.title || "新对话",
              createdAt: d.data.createdAt || Date.now(),
              updatedAt: d.data.updatedAt || Date.now(),
              messageCount: (d.data.messages || []).length,
            },
          ];
        }
      }
    } catch (e) {}
  }

  state.conversations = list.map((m) => ({
    id: m.id,
    title: m.title,
    createdAt: m.createdAt,
    updatedAt: m.updatedAt,
    messageCount: m.messageCount,
    messages: null,
    _loaded: false,
  }));

  if (!state.conversations.length) {
    const c = addConvLocal();
    await saveConv(c);
    state.conversations[0]._loaded = true;
  }

  const lid = localStorage.getItem("ai-chat-current-id");
  let targetConv = state.conversations.find((c) => c.id === lid);
  if (!targetConv) targetConv = state.conversations[0];

  await loadConv(targetConv.id);
  switchConv(targetConv.id);

  const fbSettings = localStorage.getItem("ai-chat-settings-fb");
  if (fbSettings) {
    try {
      state.settings = { ...state.settings, ...JSON.parse(fbSettings) };
      saveSettings();
      localStorage.removeItem("ai-chat-settings-fb");
    } catch (e) {}
  }
}

async function loadConv(id) {
  const conv = state.conversations.find((c) => c.id === id);
  if (!conv || conv._loaded) return;
  try {
    const r = await fetch(API_CONV + "?id=" + encodeURIComponent(id));
    if (r.ok) {
      const d = await r.json();
      Object.assign(conv, d);
    }
  } catch (e) {}
  conv._loaded = true;
}

function addConvLocal(title) {
  const c = {
    id: "c_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6),
    title: title || "新对话",
    messages: [],
    createdAt: Date.now(),
    updatedAt: Date.now(),
    _loaded: true,
  };
  state.conversations.unshift(c);
  return c;
}

function addConv(title) {
  const c = addConvLocal(title);
  saveConv(c);
  return c;
}

function getConv() {
  return state.conversations.find((c) => c.id === state.currentId) || null;
}

async function switchConv(id) {
  if (state.isStreaming) return;
  const c = state.conversations.find((x) => x.id === id);
  if (!c) return;
  state.currentId = id;
  localStorage.setItem("ai-chat-current-id", id);
  if (!c._loaded) await loadConv(id);
  renderAll();
  scrollEnd();
}

function delConv(id) {
  if (state.isStreaming || state.conversations.length <= 1) {
    toast("至少保留一个对话");
    return;
  }
  const i = state.conversations.findIndex((c) => c.id === id);
  if (i < 0) return;
  state.conversations.splice(i, 1);
  fetch(API_CONV + "?id=" + encodeURIComponent(id), { method: "DELETE" }).catch(
    () => {},
  );
  clearTimeout(convSaveTimers[id]);
  delete convSaveTimers[id];
  if (state.currentId === id) {
    const n = state.conversations[Math.min(i, state.conversations.length - 1)];
    state.currentId = n.id;
    localStorage.setItem("ai-chat-current-id", n.id);
    if (!n._loaded) loadConv(n.id).then(() => renderAll());
    else renderAll();
  } else {
    renderAll();
  }
  toast("已删除");
}

function clearMemory() {
  if (state.isStreaming) return;

    toast("当前对话无记忆数据");

  }
  c.memory = { shortTerm: [], longTerm: [], lastMergedRound: 0 };

  toast("记忆已清除");
}

function renderMsgs() {
  const container = dm.chatContainer;
  const prevDist = container.scrollHeight - container.scrollTop - container.clientHeight;
  dm.messagesContainer.querySelectorAll(".message").forEach((m) => m.remove());
  const conv = getConv(),
    msgs = conv && conv.messages ? conv.messages : [];
  if (!msgs.length) {
    dm.emptyState.style.display = "flex";
    return;
  }
  dm.emptyState.style.display = "none";
  const df = document.createDocumentFragment();
  msgs.forEach((msg, i) => {
    df.appendChild(buildMsg(msg, i, i === msgs.length - 1));
  });
  dm.messagesContainer.appendChild(df);
  container.scrollTop = container.scrollHeight - container.clientHeight - prevDist;
}

const COLLAPSE_LEN = 500;
function buildMsg(msg, idx, isLast) {
  const div = document.createElement("div");
  div.className =
    "message " +
    msg.role +
    (msg.streaming ? " streaming" : "") +
    (msg.error ? " error" : "");
  div.dataset.index = idx;
  const av = msg.role === "user" ? "U" : msg.role === "assistant" ? "AI" : "!";
  const rn =
    msg.role === "user" ? "你" : msg.role === "assistant" ? "AI" : "错误";
  const content = msg.content || "";
  const long = !msg.streaming && !isLast && content.length > COLLAPSE_LEN;
  const actions =
    msg.role !== "user" && !msg.streaming
      ? '<div class="message-actions"><button class="btn-msg-action" data-act="continue" title="继续补全">▶️</button><button class="btn-msg-action" data-act="retry" title="重新生成">🔄</button><button class="btn-msg-action" data-act="illustrate" title="配图">' + (msg.illustration ? "🖼️" : "🖼") + '</button><button class="btn-msg-action" data-act="copy" title="复制">📋</button></div>'
      : msg.role === "user"
        ? '<div class="message-actions"><button class="btn-msg-action" data-act="recall" title="撤回">↩️</button><button class="btn-msg-action" data-act="retry-user" title="重新发送">🔄</button><button class="btn-msg-action" data-act="copy" title="复制">📋</button></div>'
        : "";
  div.innerHTML =
    '<div class="message-avatar">' +
    av +
    '</div><div class="message-body"><div class="message-header"><span class="message-role">' +
    rn +
    '</span><span class="message-time">' +
    (msg.time || "") +
    "</span>" +
    (msg.streaming
      ? '<span class="status-badge streaming">生成中</span>'
      : "") +
    '</div><div class="message-content' +
    (long ? " collapsed" : "") +
    '">' +
    h(content) +
    "</div>" +
    (long ? '<div class="expand-bar"><button class="btn-expand">展开全部 ↓</button></div>' : "") +
    actions +
    "</div>";
  // 如果是 AI 回复且存在对应轮次的 STM，附加记忆面板
  if (msg.role === "assistant" && !msg.streaming && !msg.error) {
    var _conv = getConv();
    if (_conv && _conv.memory) {
      var _round = 0;
      var _msgs = _conv.messages;
      for (var _j = 0; _j <= idx; _j++) {
        if (_msgs[_j].role === "user") _round++;
      }
      var _panelHTML = typeof buildMemoryPanelHTML === "function" ? buildMemoryPanelHTML(_conv, _round) : "";
      if (_panelHTML) {
        div.querySelector(".message-body").insertAdjacentHTML("beforeend", _panelHTML);
      }
    }
  }
  if (msg.role === "assistant" && !msg.streaming && msg.illustration) {
    var _conv = getConv();
    var _convId = _conv ? _conv.id : "";
    var _img = document.createElement("div");
    _img.className = "message-illustration";
    // t=createdAt 作 cache buster：每次重新生成 createdAt 变 → URL 变 → 浏览器重新加载新图，
    // 避免同 URL 命中缓存显示旧图。图未变时 createdAt 不变，仍可享缓存。
    var _t = msg.illustration.createdAt || "";
    _img.innerHTML = '<img src="/api/illustration?conv=' + encodeURIComponent(_convId) + '&idx=' + idx + '&t=' + _t + '" loading="lazy" onerror="this.parentNode.innerHTML=\'<span class=\\\'ill-placeholder\\\'>[插图加载失败]</span>\'">';
    div.querySelector(".message-body").appendChild(_img);
  }
  return div;
}

function recallMsg(i) {
  if (state.isStreaming) return;
  const c = getConv();
  if (!c) return;
  c.messages.splice(i, i < c.messages.length - 1 ? 2 : 1);
  // 清理被撤回轮次对应的记忆数据
  if (c.memory) {
    const totalRounds = c.messages.filter(function(m) { return m.role === "user"; }).length;
    c.memory.shortTerm = c.memory.shortTerm.filter(function(s) { return s.round <= totalRounds; });
    if (c.memory.lastMergedRound > totalRounds) {
      c.memory.lastMergedRound = totalRounds;
      c.memory.longTerm = c.memory.longTerm.filter(function(l) {
        var parts = l.roundsCovered.split("-");
        return parseInt(parts[parts.length - 1]) <= totalRounds;
      });
    }
  }
  c.updatedAt = Date.now();
  save(c);
  renderMsgs();
  hdrTitle();
  toast("已撤回");
}
function retryMsg(i) {
  if (state.isStreaming) return;
  const c = getConv();
  if (!c) return;
  let ui = -1;
  for (let j = i - 1; j >= 0; j--) {
    if (c.messages[j].role === "user") {
      ui = j;
      break;
    }
  }
  if (ui >= 0) {
    const uc = c.messages[ui].content;
    c.messages.splice(ui);
    // 清理被移除轮次对应的记忆数据
    if (c.memory) {
      var tr2 = c.messages.filter(function(m) { return m.role === "user"; }).length;
      c.memory.shortTerm = c.memory.shortTerm.filter(function(s) { return s.round <= tr2; });
      if (c.memory.lastMergedRound > tr2) c.memory.lastMergedRound = tr2;
      c.memory.longTerm = c.memory.longTerm.filter(function(l) {
        var parts = l.roundsCovered.split("-");
        return parseInt(parts[parts.length - 1]) <= tr2;
      });
    }
    c.updatedAt = Date.now();
    save(c);
    renderMsgs();
    sendMsg(uc);
  }
}
function retryUserMsg(i) {
  if (state.isStreaming) return;
  const c = getConv();
  if (!c) return;
  const uc = c.messages[i].content;
  c.messages.splice(i);
  // 清理被移除轮次对应的记忆数据
  if (c.memory) {
    var tr3 = c.messages.filter(function(m) { return m.role === "user"; }).length;
    c.memory.shortTerm = c.memory.shortTerm.filter(function(s) { return s.round <= tr3; });
    if (c.memory.lastMergedRound > tr3) c.memory.lastMergedRound = tr3;
    c.memory.longTerm = c.memory.longTerm.filter(function(l) {
      var parts = l.roundsCovered.split("-");
      return parseInt(parts[parts.length - 1]) <= tr3;
    });
  }
  c.updatedAt = Date.now();
  save(c);
  renderMsgs();
  sendMsg(uc);
}
function contMsg(i) {
  if (state.isStreaming) return;
  const c = getConv();
  if (!c) return;
  const am = c.messages[i];
  if (!am || am.role !== "assistant") return;
  const ll = am.content.trim().split("\n").pop().slice(-60);
  c.updatedAt = Date.now();
  save(c);
  renderMsgs();
  sendMsg("继续，请直接从「" + ll + "」后面续写完整，不要重复已有内容。");
}
function copyMsg(i) {
  const c = getConv();
  if (!c) return;
  const t = c.messages[i].content;
  navigator.clipboard
    .writeText(t)
    .then(() => toast("已复制"))
    .catch(() => {
      const ta = document.createElement("textarea");
      ta.value = t;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      toast("已复制");
    });
}

async function sendMsg(content) {
  if (!content.trim() || state.isStreaming) return;
  const { apiUrl, apiKey, modelName: model, stream } = state.settings;
  if (!apiUrl || !apiKey || !model) {
    toast("请先配置 API 信息");
    dm.settingsBtn.click();
    return;
  }
  let conv = getConv();
  if (!conv) return;
  state.isStreaming = true;
  renderSidebar();
  dm.sendBtn.className = "btn-stop";
  dm.sendBtn.textContent = "■";
  dm.sendBtn.title = "停止生成";
  dm.sendBtn.disabled = false;
  dm.inputText.disabled = true;
  const time = new Date().toLocaleTimeString("zh-CN", {
    hour: "2-digit",
    minute: "2-digit",
  });
  let fullContent = content.trim();
  if (state.uploadedFiles.length) {
    const fileTexts = state.uploadedFiles.map((f) => "【" + f.name + "】\n" + f.content).join("\n\n");
    fullContent = fullContent ? fileTexts + "\n\n" + fullContent : fileTexts;
    state.uploadedFiles = [];
    dm.uploadedFiles.innerHTML = "";
  }
  conv.messages.push({
    role: "user",
    content: fullContent,
    time,
    id: Date.now() + "_" + Math.random().toString(36).slice(2, 6),
  });
  const first = conv.messages.filter((m) => m.role === "user").length === 1;
  conv.messages.push({
    role: "assistant",
    content: "",
    time: "",
    streaming: true,
    id: Date.now() + "_" + Math.random().toString(36).slice(2, 6),
  });
  conv.updatedAt = Date.now();
  save(conv);
  dm.inputText.value = "";
  resize();
  renderMsgs();
  scrollEnd();
  if (first) mtTitle(conv.id);
  const aiIdx = conv.messages.length - 1;
  try {
    state.abortController = new AbortController();
    if (stream) await streamCall(model, aiIdx, conv);
    else await normalCall(model, aiIdx, conv);
  } catch (err) {
    const ct =
      err.name === "AbortError" ? "[已取消]" : err.message || "请求失败";
    conv.messages[aiIdx] = {
      ...conv.messages[aiIdx],
      content: ct,
      streaming: false,
      error: err.name !== "AbortError",
    };
    if (err.name === "AbortError") toast("已取消");
    else toast("请求失败: " + err.message);
    save(conv);
    renderMsgs();
  } finally {
    state.isStreaming = false;
    renderSidebar();
    state.abortController = null;
    dm.sendBtn.className = "btn-send";
    dm.sendBtn.textContent = "➤";
    dm.sendBtn.title = "";
    dm.inputText.disabled = false;
    // 触发记忆更新（异步，不影响用户体验）
    var _convForMemory = conv;
    var _convIdForMemory = conv.id;
    var _settingsForMemory = { ...state.settings };
    setTimeout(function() {
      triggerMemoryUpdate(_convForMemory, _settingsForMemory).then(function() {
        save(_convForMemory);
        if (state.currentId === _convIdForMemory) renderMsgs();
      });
    }, 500);
    dm.inputText.focus();
  }
}

// 非流式调用链: messages → injectSystemPrompt → buildBody → callLLM → extractContent → formatContent
async function normalCall(model, aiIdx, conv) {
  const { apiUrl, apiKey } = state.settings;
  const chain = pipe(
    injectSystemPrompt(conv),
    buildRequestBody(model, false),
    callLLM(apiUrl, apiKey),
    extractContent,
    formatContent
  );
  const content = await chain(conv.messages);
  const time = new Date().toLocaleTimeString("zh-CN", {
    hour: "2-digit",
    minute: "2-digit",
  });
  conv.messages[aiIdx] = {
    ...conv.messages[aiIdx],
    content,
    streaming: false,
    time,
  };
  conv.updatedAt = Date.now();
  save(conv);
  renderMsgs();
}

// 流式调用: 前半段用 pipe，后半段用异步生成器逐块输出
async function streamCall(model, aiIdx, conv) {
  const { apiUrl, apiKey } = state.settings;
  const prepareBody = pipe(injectSystemPrompt(conv), buildRequestBody(model, true));
  const body = await prepareBody(conv.messages);
  const response = await callLLM(apiUrl, apiKey)(body);

  let fc = "";
  for await (const delta of streamContent(response)) {
    fc += delta;
    conv.messages[aiIdx].content = fc;
    updateMsgContent(aiIdx, fc, true);
  }
  const time = new Date().toLocaleTimeString("zh-CN", {
    hour: "2-digit",
    minute: "2-digit",
  });
  conv.messages[aiIdx] = {
    ...conv.messages[aiIdx],
    content: fc,
    streaming: false,
    time,
  };
  conv.updatedAt = Date.now();
  save(conv);
  renderMsgs();
}

dm.uploadBtn.addEventListener("click", () => dm.fileInput.click());
dm.fileInput.addEventListener("change", () => {
  const files = [...dm.fileInput.files];
  if (!files.length) return;
  let loaded = 0;
  files.forEach((f) => {
    const reader = new FileReader();
    reader.onload = () => {
      state.uploadedFiles.push({ name: f.name, content: reader.result });
      loaded++;
      if (loaded === files.length) {
        renderUploadedFiles();
        dm.sendBtn.disabled = !(dm.inputText.value.trim() || state.uploadedFiles.length);
        toast("已添加 " + files.length + " 个文件");
      }
    };
    reader.onerror = () => { loaded++; toast("读取失败: " + f.name); };
    reader.readAsText(f);
  });
  dm.fileInput.value = "";
});
function renderUploadedFiles() {
  dm.uploadedFiles.innerHTML = "";
  if (!state.uploadedFiles.length) return;
  const df = document.createDocumentFragment();
  state.uploadedFiles.forEach((f, i) => {
    const chip = document.createElement("span");
    chip.className = "file-chip";
    chip.dataset.index = i;
    chip.innerHTML = '<span class="file-name">' + h(f.name) + '</span><button class="file-remove" title="移除">✕</button>';
    df.appendChild(chip);
  });
  dm.uploadedFiles.appendChild(df);
}
dm.uploadedFiles.addEventListener("click", (e) => {
  const btn = e.target.closest(".file-remove");
  if (!btn) return;
  const chip = btn.closest(".file-chip");
  const i = parseInt(chip.dataset.index);

  dm.topPEl.value = state.settings.topP || "";
  dm.freqPenaltyEl.value = state.settings.frequencyPenalty || "";
  dm.presPenaltyEl.value = state.settings.presencePenalty || "";

        .replace("/v1/chat/completions", "")
        .replace("/chat/completions", ""),

dm.saveSettingsBtn.addEventListener("click", () => {
  let u = dm.apiUrlEl.value.trim();
  if (u && !/\/chat\/completions\/?$/.test(u)) {
    // 只对没有具体路径的 base URL 自动补全，已有自定义路径的不动
    const match = u.match(/^https?:\/\/[^\/]+(\/.*)?$/);
    const path = match ? (match[1] || "") : "";
    if (!path || /^\/v1\/?$/.test(path)) {
      u = u.replace(/\/+$/, "");
      if (!/\/v1$/.test(u)) u += "/v1";
      u += "/chat/completions";
      dm.apiUrlEl.value = u;
    }
  }
  state.settings.apiUrl = u;
  state.settings.apiKey = dm.apiKeyEl.value.trim();
  state.settings.modelName = dm.modelNameEl.value.trim();
  state.settings.stream = dm.streamToggle.checked;
  state.settings.reasoningEffort = dm.reasoningEffort.value;
  state.settings.temperature = dm.tempEl.value.trim();
  state.settings.maxTokens = dm.maxTokensEl.value.trim();
  state.settings.topP = dm.topPEl.value.trim();
  state.settings.frequencyPenalty = dm.freqPenaltyEl.value.trim();
  state.settings.presencePenalty = dm.presPenaltyEl.value.trim();
  // 提交 MP 配置到 /api/memory/config（开关 + working tokens + 抽取模型）
  try {
    const wt = parseInt(document.getElementById("mpWorkingTokens").value, 10);
    const mpBody = {
      workingMemoryTokens: Number.isFinite(wt) ? wt : 32000,
      extractionModel: document.getElementById("mpExtractionModel").value.trim(),
      enabledModules: { canon: document.getElementById("mpEnabled").checked },
      continuity: { enabled: document.getElementById("mpContinuityEnabled").checked },
    };
    fetch("/api/memory/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(mpBody),
    });
  } catch {}
  saveSettings();
  clsSet();
  toast("已保存");
});

async function genIllPrompt() {
  if (!state.illustrateTarget) return;
  const { convId, msgIdx } = state.illustrateTarget;
  const radio = document.querySelector('input[name="illSource"]:checked');
  const mode = radio ? radio.value : "extract";
  dm.illStatus.className = "ill-status busy";
  dm.illStatus.innerHTML = '<span class="spinner"></span>生成提示词中…';
  try {
    const r = await fetch("/api/illustrate/prompt", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ convId, msgIdx, mode }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "失败");
    dm.illPrompt.value = d.prompt;
    dm.illStatus.textContent = "提示词已生成，可编辑后确认";
    dm.illStatus.className = "ill-status";
  } catch (e) {
    dm.illStatus.textContent = "失败：" + e.message;
    dm.illStatus.className = "ill-status error";
  }
}
dm.illGenPromptBtn.addEventListener("click", genIllPrompt);

async function confirmIllustrate() {
  if (!state.illustrateTarget || state.isIllustrating) return;
  const prompt = dm.illPrompt.value.trim();
  if (!prompt) { toast("提示词不能为空"); return; }
  const { convId, msgIdx } = state.illustrateTarget;
  state.isIllustrating = true;
  dm.illConfirmBtn.disabled = true;
  dm.illConfirmBtn.textContent = "生成中…";
  dm.illStatus.className = "ill-status busy";
  dm.illStatus.innerHTML = '<span class="spinner"></span>画图中…';
  try {
    const r = await fetch("/api/illustrate/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ convId, msgIdx, prompt }),
    });
    const d = await r.json();
    // server.js: 成功 200 返回 {illustration:{engine}}（无 ok 字段），
    // 失败 500 返回 {error}（无 ok 字段）。故成功判断只用 r.ok，不能用 d.ok。
    if (!r.ok) throw new Error(d.error || "画图失败");
    // 按 convId 定位对话（异步期间用户可能已切换对话）
    const c = state.conversations.find((x) => x.id === convId);
    if (c && c.messages[msgIdx]) {
      c.messages[msgIdx].illustration = {
        engine: d.illustration?.engine, prompt, createdAt: Date.now(),
      };
      save(c);
    }
    // 直接关闭，绕过 clsIll 的 isIllustrating 守卫（该守卫仅用于阻止用户在生成中手动关闭）
    dm.illustrateModal.classList.remove("active");
    state.illustrateTarget = null;
    renderMsgs();
    toast("插图已生成");
  } catch (e) {
    dm.illStatus.textContent = "失败：" + e.message;
    dm.illStatus.className = "ill-status error";
  } finally {
    state.isIllustrating = false;
    dm.illConfirmBtn.disabled = false;
    dm.illConfirmBtn.textContent = "确认生成插图";
  }
}
dm.illConfirmBtn.addEventListener("click", confirmIllustrate);

// ── 记忆控制台 drawer ──
(function memConsole() {
  const root = document.getElementById("memConsole");
  const bar = document.getElementById("memConsoleBar");
  const body = document.getElementById("memConsoleBody");
  const toggle = document.getElementById("memConsoleToggle");
  if (!root || !bar || !body || !toggle) return;
  let polling = false;
  let sinceTs = 0;
  let timer = null;
  let filters = { info: true, warn: true, error: true };
  const applyFiltersToDom = () => {
    body.querySelectorAll(".mem-log-line").forEach(el => {
      el.style.display = filters[el.dataset.level] === false ? "none" : "";
    });
  };
  const updateFilters = () => {
    document.querySelectorAll(".mem-console-filters input").forEach(c => {
      filters[c.dataset.level] = c.checked;
    });
    applyFiltersToDom();
  };
  document.querySelectorAll(".mem-console-filters input").forEach(c =>
    c.addEventListener("change", updateFilters)
  );
  async function poll() {
    if (!polling) return;
    try {
      const r = await fetch("/api/memory/log?since=" + sinceTs + "&limit=200");
      if (r.ok) {
        const d = await r.json();
        (d.logs || []).forEach(l => {
          const div = document.createElement("div");
          div.className = "mem-log-line " + l.level;
          div.dataset.level = l.level;
          div.style.display = filters[l.level] === false ? "none" : "";
          const time = new Date(l.ts).toLocaleTimeString("zh-CN", { hour12: false });
          div.textContent = "[" + time + "] " + l.text;
          body.appendChild(div);
          sinceTs = Math.max(sinceTs, l.ts);
        });
        while (body.childNodes.length > 500) body.removeChild(body.firstChild);
        body.scrollTop = body.scrollHeight;
      }
    } catch {}
    if (polling) timer = setTimeout(poll, 2000);
  }
  bar.addEventListener("click", (e) => {
    // 点 filter 的 input/label/文字只切 filter，不折叠抽屉
    if (e.target.closest(".mem-console-filters") || e.target === toggle) return;
    const collapsed = root.classList.toggle("collapsed");
    toggle.textContent = collapsed ? "▲" : "▼";
    if (collapsed) { polling = false; if (timer) clearTimeout(timer); }
    else { polling = true; poll(); }
  });
})();
